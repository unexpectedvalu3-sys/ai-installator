<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connexion — Comparateur Courtier</title>
<style>
  :root{
    --bg:#0c2436; --card:#fff; --ink:#152433; --muted:#5a6b7d;
    --line:#e3e9f0; --teal:#1e6fb5; --accent:#f07e26; --error:#b3402f;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; display:grid; place-items:center;
        background:radial-gradient(1200px 600px at 70% -10%, #143852, #0c2436);
        color:var(--ink); font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif; }
  .box{ width:min(400px,92vw); background:var(--card); border-radius:18px;
        box-shadow:0 30px 70px -24px rgba(0,0,0,.5); padding:40px 34px; }
  .mark{ width:48px; height:48px; border-radius:12px; display:grid; place-items:center;
         overflow:hidden; margin-bottom:20px; }
  h1{ font-size:1.35rem; letter-spacing:-.02em; margin:0 0 4px; }
  .sub{ color:var(--muted); font-size:.9rem; margin:0 0 26px; }
  label{ display:block; font-size:.76rem; font-weight:650; letter-spacing:.05em;
         text-transform:uppercase; color:var(--muted); margin:0 0 6px; }
  input{ width:100%; padding:.8em 1em; border:1px solid #cdd8e4; border-radius:10px;
         font:inherit; font-size:1rem; margin-bottom:16px; color:var(--ink); background:#fff; }
  input:focus{ outline:none; border-color:var(--teal); box-shadow:0 0 0 3px #e3eef8; }
  button{ width:100%; padding:.9em; border:0; border-radius:999px; cursor:pointer;
          background:linear-gradient(180deg,#f79b4f,var(--accent)); color:#1a1208;
          font:inherit; font-weight:700; font-size:1rem;
          box-shadow:inset 0 1px 0 rgba(255,255,255,.4); }
  button:hover{ filter:brightness(1.03); }
  .err{ background:#fbeaea; color:var(--error); border:1px solid #f0cccc;
        border-radius:10px; padding:10px 14px; font-size:.86rem; margin-bottom:18px; }
  .foot{ color:var(--muted); font-size:.76rem; text-align:center; margin:22px 0 0; }
</style>
</head>
<body>
  <form class="box" method="post" action="/login" autocomplete="on">
    <div class="mark"><img src="/static/mascotte.png" style="width:100%;height:100%;object-fit:cover"></div>
    <h1>Espace courtier</h1>
    <p class="sub">Connectez-vous pour accéder à vos outils.</p>
    __ERROR__
    <label for="user">Identifiant</label>
    <input id="user" name="user" type="text" autocomplete="username" autofocus required>
    <label for="password">Mot de passe</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Se connecter</button>
    <p class="foot">Accès réservé — aucune donnée de santé n'est stockée.</p>
  </form>
</body>
</html>
